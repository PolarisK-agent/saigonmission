name: Update Sermons Data

on:
  schedule:
    # 02:00 KST every Tuesday and Thursday (UTC: Mon/Wed 17:00)
    - cron: "0 17 * * 1,3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sermons:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate latest sermons
        run: npm run update:sermons

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add data/sermons.json
          git commit -m "chore: update weekly sermon list"
          git push
